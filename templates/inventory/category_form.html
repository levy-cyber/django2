{% extends "inventory/base.html" %}
{% load i18n %}

{% block app %}
<div class="space-y-6">
  <div class="flex justify-between items-center">
    <h1 class="text-2xl font-bold">Add New Category</h1>
    <a href="{% url 'inventory:category_list' %}" class="btn btn-ghost">
      <i class="fa fa-times"></i> Cancel
    </a>
  </div>

  <div class="card bg-base-100 shadow max-w-2xl">
    <div class="card-body">
      <form method="post" class="space-y-4">
        {% csrf_token %}
        
        <div class="form-control">
          <label class="label">
            <span class="label-text font-bold">Category Name *</span>
          </label>
          {{ form.name }}
          {% if form.name.errors %}
            <label class="label">
              <span class="label-text-alt text-error">{{ form.name.errors.0 }}</span>
            </label>
          {% endif %}
        </div>

        <div class="form-control">
          <label class="label">
            <span class="label-text font-bold">Description</span>
          </label>
          {{ form.description }}
        </div>

        {% if form.non_field_errors %}
          <div class="alert alert-error">
            <i class="fa fa-exclamation-circle"></i>
            <span>{{ form.non_field_errors }}</span>
          </div>
        {% endif %}

        <div class="card-actions justify-end">
          <a href="{% url 'inventory:category_list' %}" class="btn btn-ghost">Cancel</a>
          <button type="submit" class="btn btn-primary">
            <i class="fa fa-save"></i> Create Category
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
